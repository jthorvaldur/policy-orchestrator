# pages.yaml — GitHub Pages deployment registry
#
# Maps source repos to their deploy targets on jthorvaldur.github.io.
# Each entry defines: what generates the pages, where they go, how they're protected.
#
# Deploy hub: jthorvaldur.github.io (user Pages repo, auto-publishes on push to main)
# Encryption: AES-256-GCM client-side, PBKDF2 100K iterations
# Encrypt tool: contacts/tools/encrypt_page.py (shared, symlink into other repos)
# Central deploy: devctl deploy-pages (reads this file, encrypts, writes to hub)
#
# Passwords in ~/.oh-my-zsh/custom/keys.zsh:
#   CONTACTS_PAGE_PASSWORD           — contacts, concepts, d72, food-trust, qwl
#   JTHORVALDUR_LEGAL_PAGE_PASSWORD  — filing, div_legal reports, caseledger exhibits
#   ENERGY_TEXAS_PAGE_PASSWORD       — energy_texas reports

hub:
  repo: jthorvaldur.github.io
  path: ~/GitHub/jthorvaldur.github.io
  url: https://jthorvaldur.github.io
  deploy: push to main (auto-publishes)
  sync_script: scripts/sync_all.sh
  passwords_file: .passwords  # gitignored

# ═══════════════════════════════════════════════════════════════════════════
# REPO: contacts
# Status: DEPLOYED
# How to update: cd ~/GitHub/contacts && ./scripts/update_all.sh
#   Or centrally: devctl deploy-pages --section=contacts --push
# Generates: contact analytics, concept maps, dimensional analysis, food-trust
# ═══════════════════════════════════════════════════════════════════════════

sections:
  contacts:
    source_repo: contacts
    source_dir: out/
    target_dir: r/contacts/
    encryption: aes-256-gcm
    password_env: CONTACTS_PAGE_PASSWORD
    session_key: _cp
    deploy_script: scripts/deploy_pages.py --push
    encrypt_tool: tools/encrypt_page.py
    pages:
      - contacts_index.html -> index.html
      - contacts_browser.html -> browser.html
      - dashboard.html -> dashboard.html
      - coherence_viz.html -> coherence.html
      - signal_signature.html -> signal.html
      - behavioral_heatmap.html -> behavioral.html
      - birthday_calendar.html -> calendar.html
      - birthdays.html -> radial.html
      - vdb_summary.html -> vdb.html

  concepts:
    source_repo: contacts
    source_dir: out/
    target_dir: r/concepts/
    encryption: aes-256-gcm
    password_env: CONTACTS_PAGE_PASSWORD
    session_key: _cp
    deploy_script: scripts/deploy_pages.py --push
    encrypt_tool: tools/encrypt_page.py
    pages:
      - concept_browser.html -> browser.html
      - concept_network.html -> network.html
      - system_overview.html -> system.html

  d72:
    source_repo: contacts
    source_dir: out/
    target_dir: r/d72/
    encryption: aes-256-gcm
    password_env: CONTACTS_PAGE_PASSWORD
    session_key: _cp
    deploy_script: scripts/deploy_pages.py --push
    encrypt_tool: tools/encrypt_page.py
    pages:
      - dimensional_analysis.html -> dimensional-analysis.html

  food-trust:
    source_repo: contacts
    source_dir: out/
    target_dir: r/food-trust/
    encryption: aes-256-gcm
    password_env: CONTACTS_PAGE_PASSWORD
    session_key: _cp
    deploy_script: scripts/deploy_pages.py --push
    encrypt_tool: tools/encrypt_page.py
    pages:
      - governance_stack.html -> governance_stack.html

