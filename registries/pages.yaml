# ═══════════════════════════════════════════════════════════════════════════
# Password zones (which password unlocks which sections):
#
#   CONTACTS_PAGE_PASSWORD:
#     r/contacts/    (9 pages)   session_key: _cp
#     r/concepts/    (3 pages)   session_key: _cp
#     r/d72/         (1 page)    session_key: _cp
#     r/food-trust/  (1 page)    session_key: _cp
#     r/qwl/         (19 pages)  session_key: qwl_key
#     r/dimensions/  (9 pages)   session_key: _cp
#
#   JTHORVALDUR_LEGAL_PAGE_PASSWORD:
#     r/cook6724-QgixOl/filing/  (7 pages)   session_key: filing_key
#     r/reports/                  (45+ pages) session_key: filing_key
#     r/case/                     (6 pages)   session_key: filing_key
#
#   ENERGY_TEXAS_PAGE_PASSWORD:
#     r/energy/                   (11 pages)  session_key: energy_key
#
# ═══════════════════════════════════════════════════════════════════════════
# Deploy pattern (same for all sections):
#
#   1. Source repo generates HTML in source_dir/
#   2. devctl deploy-pages reads this file + password from env
#   3. Encrypts each page with AES-256-GCM (PBKDF2 100K iter)
#   4. Writes encrypted HTML to ~/GitHub/jthorvaldur.github.io/target_dir/
#   5. --push commits + pushes → GitHub auto-publishes
#
# To add a new section:
#   1. Add entry here (under sections: or pending:)
#   2. Set password_env in keys.zsh (new password or reuse existing zone)
#   3. Run: devctl deploy-pages --section=NAME --pending --verify --push
# ═══════════════════════════════════════════════════════════════════════════
